[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers for categorization
markers =
    asyncio: async test marker
    unit: unit tests (fast, no external dependencies)
    integration: integration tests (require external services)
    slow: slow tests (> 1 second)
    requires_api_key: tests requiring API keys
    requires_mcp: tests requiring MCP servers
    openai: tests specific to OpenAI provider
    anthropic: tests specific to Anthropic provider
    google: tests specific to Google provider
    deepinfra: tests specific to DeepInfra provider

# Output options
console_output_style = progress
addopts = 
    --strict-markers
    --tb=short
    --verbose
    -m "not integration"

# Coverage options (if pytest-cov is installed)
# addopts = --cov=energbench --cov-report=term-missing --cov-report=html

# Minimum Python version
minversion = 3.10
