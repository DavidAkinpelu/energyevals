# Reasoning model override (optional)
# Set to true/false to override auto-detection, or omit for auto-detect
# Auto-detection checks if model name starts with: o1, o3, o4, gpt-5
# Reasoning models use reasoning_effort instead of temperature
# is_reasoning_model: true

# Questions file
questions_file: data/AI Evals New Questions.xlsx - Q&As.csv

# Question selection (optional)
# Leave empty or comment out to run all questions
# questions: [1, 2, 3]              # Specific question IDs
# questions: 1-5                     # Range of questions

# Observability settings
observability:
  enabled: true                      # Enable/disable tracing
  backend: json                      # json, langfuse, both, or auto
  output_dir: ./benchmark_traces     # Directory for trace files

# MCP settings
mcp:
  enabled: true                      # Use MCP tools (requires server URLs in .env)

# Agent settings
agent:
  max_iterations: 25                 # Maximum iterations per question

# Output settings
output:
  results_dir: ./benchmark_results   # Directory for result files
  save_answers: true                 # Save full answers in results
