# Benchmark configuration: WITHOUT energy-domain tools
# Reproduces the "without tools" experiment from the paper.
# Only system, search, and weather tools are enabled -- energy-specific tools
# (tariffs, solar/wind, battery, gridstatus, dockets) are excluded.

models:
  - provider: anthropic
    model: claude-sonnet-4-6
    effort: low
  - provider: openai
    model: gpt-5.2
    effort: low
  - provider: openai
    model: gpt-5-mini
    effort: low
  - provider: google
    model: gemini-3.1-pro-preview
    effort: low
  - provider: deepinfra
    model: deepseek-ai/DeepSeek-V3.2
  - provider: deepinfra
    model: moonshotai/Kimi-K2.5
  - provider: deepinfra
    model: Qwen/Qwen3-Max-Thinking

questions_file: data/evals_full_dataset_without_tools.csv

observability:
  enabled: true
  output_dir: ./benchmark_traces
  run_name: without_tools_final

mcp:
  enabled: true

agent:
  max_iterations: 25
  num_trials: 1
  shuffle: true
  seed_mode: rotate
  seed: 101
  tool_timeout: 240.0
  max_tool_result_chars: 250000

tools:
  enabled: true
  include: [system, search, openweather]
  exclude: []

output:
  results_dir: ./benchmark_results
  save_answers: true
