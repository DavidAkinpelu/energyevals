# Evaluation Pipeline Configuration
# Used by: scripts/run_eval.py -> energbench.evaluation

# =============================================================================
# LLM Judge Settings
# =============================================================================

judge:
  provider: openai
  model: gpt-5-mini
  temperature: 0.0
  max_tokens: 4096
  # reasoning_effort: medium  # Only used with OpenAI reasoning models (o1, o3)

# =============================================================================
# Paths
# =============================================================================

# Path to benchmark trace directory (output of run_benchmark.py)
results_path: ./benchmark_traces/with_tools

# Dataset CSV with questions, answers, and approaches
dataset_path: ./data/eval_samples_with_answers.csv

# Directory for evaluation output
output_dir: ./evaluation_results

# Run name -- should match the benchmark observability run_name
# Uncomment to specify (otherwise auto-discovers model dirs under results_path)
# run_name: eval_samples

# =============================================================================
# Strategy (category -> judge mapping)
# =============================================================================
# Maps question categories to judge strategies.
# Valid strategies: "accuracy" (numerical correctness) or "attributes" (key attribute alignment).
# Categories not listed here use the default strategy.

strategy:
  default: attributes
  categories:
    "Market data retrieval and analysis": accuracy
    # "My Custom Category": accuracy

# =============================================================================
# Tolerances
# =============================================================================

tolerances:
  abs_tol: 0.5
  rel_tol: 1

# =============================================================================
# Statistics
# =============================================================================

statistics:
  confidence_level: 0.95
  significance_alpha: 0.05

# =============================================================================
# Comparisons (optional)
# =============================================================================

# Run paired cross-model significance tests when true
# compare: true

# =============================================================================
# Scope (optional)
# =============================================================================

# Filter to specific models (directory names under results_path/{run_name}/)
# models:
#   - openai_gpt-4.1
#   - anthropic_claude-sonnet-4-20250514

# Filter to specific question IDs
# questions: [1, 3, 5]
