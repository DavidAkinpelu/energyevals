# Evaluation Pipeline Configuration
# Used by: scripts/run_eval.py -> energyevals.evaluation
#
# This config drives the LLM judge that scores benchmark traces.
# Update results_path and output_dir to point at the experiment you want to evaluate.

judge:
  provider: openai
  model: gpt-5-mini
  temperature: 0.0
  max_tokens: 4096
  reasoning_effort: low

results_path: ./benchmark_traces/with_tools_final

dataset_path: ./data/evals_full_dataset_with_gridstatus.csv

output_dir: ./evaluation_results/with_tools

strategy:
  default: attributes
  categories:
    "Market data retrieval and analysis": accuracy
    "Advanced quantitative modeling and decision analytics": accuracy

tolerances:
  abs_tol: 2
  rel_tol: 10

statistics:
  confidence_level: 0.95
  significance_alpha: 0.05

log_level: INFO
